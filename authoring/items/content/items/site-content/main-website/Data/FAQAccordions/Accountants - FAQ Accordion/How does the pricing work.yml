      Hint: Answer
      Value: <p>Sage Accounting is a monthly subscription service. You can set up a direct debit or pay with your credit or debit card. The VAT per month is 20% of the product's monthly price. There are no hidden costs and never will be. Once you've signed up to your customisable Sage for Accountants plans you can add Sage Accounting for each client for an additional cost.</p>
