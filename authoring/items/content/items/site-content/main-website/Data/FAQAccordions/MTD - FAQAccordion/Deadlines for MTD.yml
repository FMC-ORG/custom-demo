    - ID: "acb70819-a9d8-4255-bc4b-36c2ad36ec92"
      Hint: Answer
      Value: "<p>MTD for Income Tax applies in phases to self-employed individuals and landlords with qualifying income above the thresholds: 6 April 2026 for incomes over £50,000, 6 April 2027 for incomes over £30,000, and 6 April 2028 for incomes over £20,000.</p>"
