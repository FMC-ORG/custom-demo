siteCollection: "mysite"  
siteName: "mysite"  
category: "Banners"  
  
component:  
  namePascal: "Hero"  
  nameKebab: "hero"  
  kind: "simple"  
  filePath: "src/components/banners/hero.tsx"  
  componentMapKey: "hero"  
  componentMapImportAlias: "hero"  
  
templates:  
  parent:  
    create: true  
    path: "/sitecore/templates/Project/mysite/Components/Banners/Hero"  
    name: "Hero"  
    sectionName: "Data"  
    fields:  
      - name: "Title"  
        type: "Single-Line Text"  
      - name: "Description"  
        type: "Rich Text"  
      - name: "BackgroundImage"  
        type: "Image"  
      - name: "CtaLink"  
        type: "General Link"  
    baseTemplates: []  
    standardValues:  
      create: true  
      defaults:  
        Title: "$name"  
        Description: "<p>Enter description here</p>"  
        CtaLink: '<link text="Learn more" anchor="" linktype="external" class="" title="" target="" querystring="" url="#" />'  
      masters: []  
      addHorizonDatasourceGrouping: false  
  
  child:  
    create: false  
    path: ""  
    name: ""  
    sectionName: "Data"  
    fields: []  
    baseTemplates: []  
    standardValues:  
      create: false  
      defaults: {}  
      masters: []  
  
folderTemplate:  
  create: true  
  path: "/sitecore/templates/Project/mysite/Folders/Hero Folder"  
  name: "Hero Folder"  
  standardValues:  
    create: true  
    masters:  
      - "Hero"  
  
datasourceFolder:  
  create: true  
  path: "/sitecore/content/mysite/mysite/Data/Heroes"  
  name: "Heroes"  
  
rendering:  
  create: true  
  path: "/sitecore/layout/Renderings/Project/mysite/Banners/Hero"  
  name: "Hero"  
  componentName: "hero"  
  datasourceTemplatePath: "/sitecore/templates/Project/mysite/Components/Banners/Hero"  
  datasourceLocationQuery: "query:$site/*[@@name='Data']/*[@@templatename='Hero Folder']|query:$sharedSites/*[@@name='Data']/*[@@templatename='Hero Folder']"  
  dataSource: ""  
  addFieldEditorButton: "1"  
  useComponentQuery: false  
  componentQuery: ""  
  
react:  
  propsShape: "default-jss"  
  variants:  
    - "Default"  
  
mcp:  
  useMcp: true  
  planOnly: false  
  
verification:  
  checks:  
    - "Template exists"  
    - "__Standard Values exists"  
    - "Folder template insert options set"  
    - "Content folder created under /Data"  
    - "Rendering created as JSON Rendering"  
    - "ComponentQuery left empty"  
    - "TSX uses default JSS shape"  
  
notes:  
  - "Simple datasource component"  