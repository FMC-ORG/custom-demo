project:  
  reactComponentRoot: "src/components/uiim"  
  shadcnImportBase: "@/components/ui"  
  componentMapPath: ".sitecore/component-map.ts"  
  sitecoreJssPackage: "@sitecore-jss/sitecore-jss-nextjs"  
  usesTailwind: true  
  usesShadcn: true  
  
tools:  
  marketerMcp:  
    preferred: true  
    useFor:  
      - "create or update Sitecore templates"  
      - "create or update standard values"  
      - "create or update folder templates"  
      - "create or update datasource folders"  
      - "create or update renderings"  
      - "set datasource location and ComponentQuery"  
  documentationMcp:  
    allowed: true  
    useWhen:  
      - "official Sitecore behavior is unclear"  
      - "GraphQL/rendering configuration is uncertain"  
      - "the agent needs product documentation verification"  
  
siteCollection: "mysite"  
siteName: "mysite"  
category: "Banners"  
  
component:  
  namePascal: "Hero"  
  nameKebab: "hero"  
  kind: "simple"  
  filePath: "src/components/uiim/banners/hero.tsx"  
  componentMapKey: "hero"  
  componentMapImportAlias: "hero"  
  
design:  
  references: []  
  extractedLayout:  
    summary: "A hero banner with title, rich text, background image, and CTA."  
    visibleElements:  
      - "Title"  
      - "Description"  
      - "Background image"  
      - "CTA link"  
    inferredFields:  
      - "Title"  
      - "Description"  
      - "BackgroundImage"  
      - "CtaLink"  
    repeatedItems: false  
    likelyVariantNames:  
      - "Default"  
    responsiveViews: []  
  assumptions: []  
  openQuestions: []  
  
context:  
  usesRouteFields: false  
  routeTemplateName: ""  
  routeFields: []  
  
templates:  
  parent:  
    create: true  
    path: "/sitecore/templates/Project/mysite/Components/Banners/Hero"  
    name: "Hero"  
    sectionName: "Data"  
    fields:  
      - name: "Title"  
        type: "Single-Line Text"  
      - name: "Description"  
        type: "Rich Text"  
      - name: "BackgroundImage"  
        type: "Image"  
      - name: "CtaLink"  
        type: "General Link"  
    baseTemplates: []  
    standardValues:  
      create: true  
      defaults:  
        Title: "$name"  
      masters: []  
      addHorizonDatasourceGrouping: false  
  
  child:  
    create: false  
    path: ""  
    name: ""  
    sectionName: "Data"  
    fields: []  
    baseTemplates: []  
    standardValues:  
      create: false  
      defaults: {}  
      masters: []  
  
folderTemplate:  
  create: true  
  path: "/sitecore/templates/Project/mysite/Folders/Hero Folder"  
  name: "Hero Folder"  
  standardValues:  
    create: true  
    masters:  
      - "Hero"  
  
datasourceFolder:  
  create: true  
  path: "/sitecore/content/mysite/mysite/Data/Heroes"  
  name: "Heroes"  
  
rendering:  
  create: true  
  path: "/sitecore/layout/Renderings/Project/mysite/Banners/Hero"  
  name: "Hero"  
  componentName: "hero"  
  datasourceRequired: true  
  datasourceTemplatePath: "/sitecore/templates/Project/mysite/Components/Banners/Hero"  
  datasourceLocationQuery: "query:$site/*[@@name='Data']/*[@@templatename='Hero Folder']|query:$sharedSites/*[@@name='Data']/*[@@templatename='Hero Folder']"  
  dataSource: ""  
  addFieldEditorButton: "1"  
  useComponentQuery: false  
  componentQuery: ""  
  
react:  
  propsShape: "default-jss"  
  usesSitecoreJssHelpers: true  
  usesShadcn: true  
  usesTailwind: true  
  variants:  
    - "Default"  
  
mcp:  
  useMcp: true  
  planOnly: false  
  
verification:  
  checks:  
    - "Template exists"  
    - "__Standard Values exists"  
    - "Folder template exists"  
    - "Folder template __Masters points to Hero"  
    - "Content folder exists under /Data"  
    - "Rendering exists"  
    - "Datasource Template uses full path"  
    - "ComponentQuery is empty"  
    - "React file exists under src/components/uiim"  
    - "React uses top-level fields.Title / fields.Description / fields.BackgroundImage / fields.CtaLink"  
    - "Component map updated"  
    - "Tailwind + shadcn/ui pattern used"  
  
notes:  
  - "Prefer shadcn Card/Button primitives with Sitecore JSS editable field helpers."  