# Sitecore AI Manifest
# Auto-maintained by the AI agent during every Sitecore component task.
# Commit this file to the repo. The agent reads it before every task to avoid
# duplicates and understand the current state of AI-created Sitecore items.
#
# Do not edit manually unless correcting a known drift between this file and
# the actual Sitecore instance. If you do edit manually, add a note in the
# entry's `notes` field.
#
# This file is an *example* only and should not be used for source-of-truth
# tracking (it intentionally starts empty).

generatedAt: "2026-03-20T09:00:00Z"          # ISO timestamp of initial creation
lastUpdatedAt: "2026-03-20T09:00:00Z"        # ISO timestamp of most recent agent update
lastUpdatedBy: "cursor"        # agent identifier or session hint (e.g. "cursor", "cline", "claude")

project:
  siteCollection: "new"     # from docs/ai/config/project.yaml
  siteName: "fmc"           # from docs/ai/config/project.yaml
  sdk: "@sitecore-content-sdk/nextjs"                # from docs/ai/config/project.yaml
  renderingsRoot: "/sitecore/layout/Renderings/Project/new"
  projectTemplatesRoot: "/sitecore/templates/Project/new"
  dataRoot: "/sitecore/content/new/fmc/Data"           # derived
  projectFoldersRoot: "/sitecore/templates/Project/new/Folders" # derived
  renderingParamsRoot: "/sitecore/templates/Project/new/Rendering Parameters" # derived
  headlessVariantsRoot: "/sitecore/content/new/fmc/Presentation/Headless Variants" # derived

