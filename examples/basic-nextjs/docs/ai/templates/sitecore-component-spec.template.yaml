project:  
  reactComponentRoot: "src/components/uiim"  
  shadcnImportBase: "@/components/ui"  
  componentMapPath: ".sitecore/component-map.ts"  
  sitecoreJssPackage: "@sitecore-content-sdk/nextjs"
  usesTailwind: true  
  usesShadcn: true  
  
tools:  
  marketerMcp:  
    preferred: true  
    useFor:  
      - "create or update Sitecore templates"  
      - "create or update standard values"  
      - "create or update folder templates"  
      - "create or update datasource folders"  
      - "create or update renderings"  
      - "set insert options / __Masters"  
      - "set datasource location and ComponentQuery"  
  documentationMcp:  
    allowed: true  
    useWhen:  
      - "official Sitecore behavior is unclear"  
      - "GraphQL/rendering configuration is uncertain"  
      - "the agent needs product documentation verification"  
  
siteCollection: ""  # populated from docs/ai/config/project.yaml  
siteName: ""        # populated from docs/ai/config/project.yaml  
category: ""  
  
component:  
  namePascal: ""  
  nameKebab: ""  
  kind: "" # simple | list | context-only  
  filePath: ""  
  componentMapKey: ""  
  componentMapImportAlias: ""  
  
design:  
  references: []  
  extractedLayout:  
    summary: ""  
    visibleElements: []  
    inferredFields: []  
    repeatedItems: false  
    likelyVariantNames: []  
    responsiveViews: []  
  assumptions: []  
  openQuestions: []  
  
context:  
  usesRouteFields: false  
  routeTemplateName: ""  
  routeFields: []  
  
templates:  
  parent:  
    create: true  
    path: ""  
    name: ""  
    sectionName: "Data"  
    fields: []  
    baseTemplates: []  
    standardValues:  
      create: true  
      defaults: {}  
      masters: []  
      addHorizonDatasourceGrouping: false  
  
  child:  
    create: false  
    path: ""  
    name: ""  
    sectionName: "Data"  
    fields: []  
    baseTemplates: []  
    standardValues:  
      create: false  
      defaults: {}  
      masters: []  
  
folderTemplate:  
  create: false  
  path: ""  
  name: ""  
  standardValues:  
    create: false  
    masters: []  
  
datasourceFolder:  
  create: false  
  path: ""  
  name: ""  
  exampleItem:
    create: false
    name: ""   # e.g. component name — the item authors see first
    fields: {}  # field name -> default value pairs from __Standard Values
  
renderingParamsTemplate:
  create: true
  path: ""  # renderingParamsRoot + /<Category>/<ComponentName>
  name: ""  # same as component name
  baseTemplates:
    - "{4247AAD4-EBDE-4994-998F-E067A51B1FE4}"  # IComponentVariant
    - "{5C74E985-E055-43FF-B28C-DB6C6A6450A2}"  # IStyling
    - "{44A022DB-56D3-419A-B43B-E27E4D8E9C41}"  # Grid Parameters
    - "{3DB3EB10-F8D0-4CC9-BE26-18CE7B139EC8}"  # IRenderingId

headlessVariants:
  create: true
  containerPath: ""  # /sitecore/content/<siteCollection>/<siteName>/Presentation/Headless Variants/<ComponentName>
  variants: []       # list of variant names — must match TSX named exports exactly

rendering:
  create: true  
  path: ""  
  name: ""  
  componentName: ""  
  datasourceRequired: true  
  datasourceTemplatePath: ""  
  datasourceLocationQuery: ""  
  dataSource: ""  
  addFieldEditorButton: "1"  
  parametersTemplatePath: ""  # full path to the Rendering Parameters template
  useComponentQuery: false
  componentQuery: ""  
  
react:  
  propsShape: "" # default-jss | graphql-datasource | context-route  
  usesSitecoreJssHelpers: true  
  usesShadcn: true  
  usesTailwind: true  
  variants:        # named exports in TSX — must match headlessVariants.variants exactly
    - Default  
  
mcp:  
  useMcp: true  
  planOnly: false  
  
verification:  
  checks: []  
  
notes: []  
