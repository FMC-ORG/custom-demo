# Client Brand Theme — Eurobank
# Extracted from: https://www.eurobank.gr/el/retail
# Brand research: Kommigraphics design system, Brandfetch, 1000logos.net

client:
  name: "Eurobank"
  sourceUrl: "https://www.eurobank.gr/el/retail"
  extractedAt: "2026-04-11T10:00:00Z"
  extractedBy: "claude-code"

colors:
  primary: "#00264d"
  primaryForeground: "#ffffff"
  secondary: "#0073b1"
  secondaryForeground: "#ffffff"
  accent: "#e30613"
  accentForeground: "#ffffff"
  background: "#ffffff"
  foreground: "#1a1a1a"
  muted: "#f5f6f8"
  mutedForeground: "#5a6872"
  headerBackground: "#00264d"
  headerForeground: "#ffffff"
  footerBackground: "#00264d"
  footerForeground: "#c0c8d0"
  border: "#d8dde3"
  ring: "#0073b1"
  extra:
    - { name: "success", value: "#28a745" }
    - { name: "warning", value: "#ffc107" }
    - { name: "brandRed", value: "#e30613" }
    - { name: "brandBlue", value: "#0073b1" }

typography:
  headingFamily: "'Roboto', sans-serif"
  headingWeight: "700"
  bodyFamily: "'Roboto', sans-serif"
  bodyWeight: "400"
  monoFamily: "'Roboto Mono', monospace"
  googleFontsUrl: "https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
  scale:
    hero: "3rem"
    h1: "2.25rem"
    h2: "1.75rem"
    h3: "1.25rem"
    body: "1rem"
    small: "0.875rem"
  headingTransform: "none"
  letterSpacing: "normal"
  lineHeight: "relaxed"

spacing:
  density: "normal"
  sectionGap: "5rem"
  containerMaxWidth: "1280px"
  containerPadding: "1.5rem"

shape:
  borderRadius: "0.5rem"
  buttonRadius: "0.375rem"
  cardRadius: "0.75rem"
  imageRadius: "0.5rem"
  shadowStyle: "subtle"
  borderStyle: "subtle"

tone:
  overall: "corporate"
  colorMode: "light"
  contrast: "high"
  imagery: "photography"
  heroStyle: "split-image-text"
  cardStyle: "elevated"
  navStyle: "solid-bar"

tailwind:
  colors:
    brand:
      primary: "#00264d"
      secondary: "#0073b1"
      accent: "#e30613"
  fontFamily:
    heading: ["Roboto", "sans-serif"]
    body: ["Roboto", "sans-serif"]
  borderRadius:
    DEFAULT: "0.5rem"
    button: "0.375rem"
    card: "0.75rem"

cssVariables: |
  :root {
    --brand-primary: #00264d;
    --brand-primary-foreground: #ffffff;
    --brand-secondary: #0073b1;
    --brand-secondary-foreground: #ffffff;
    --brand-accent: #e30613;
    --brand-accent-foreground: #ffffff;
    --brand-bg: #ffffff;
    --brand-fg: #1a1a1a;
    --brand-muted: #f5f6f8;
    --brand-muted-fg: #5a6872;
    --brand-header-bg: #00264d;
    --brand-header-fg: #ffffff;
    --brand-footer-bg: #00264d;
    --brand-footer-fg: #c0c8d0;
    --brand-border: #d8dde3;
    --brand-ring: #0073b1;
    --brand-heading-font: 'Roboto', sans-serif;
    --brand-body-font: 'Roboto', sans-serif;
    --brand-radius: 0.5rem;
    --brand-button-radius: 0.375rem;
    --brand-card-radius: 0.75rem;
  }

extraction:
  confidence: "high"
  method: "web-search + brand-research"
  notes:
    - "Eurobank uses custom 'Eurobank Sans' font — substituted with Roboto for demo"
    - "Primary dark navy (#00264d) dominant in header, footer, hero overlays"
    - "Secondary blue (#0073b1) for links, interactive elements, hover states"
    - "Accent red (#e30613) from the Eurobank brand device — used for alerts and urgency"
    - "Brand device: red-blue geometric line representing history + future"
    - "Design pillars: Simplicity, Anthropocentrism, Premiumness (via Kommigraphics)"
    - "Retail page uses split-image-text hero with product promotion"
    - "Card style: elevated with subtle shadow, clean white backgrounds"
    - "Photography style: professional, lifestyle, human-centered"
