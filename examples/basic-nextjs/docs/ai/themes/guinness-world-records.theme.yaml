# Client Brand Theme — Guinness World Records
# Generated by theme extraction from https://www.guinnessworldrecords.com/

client:
  name: "Guinness World Records"
  sourceUrl: "https://www.guinnessworldrecords.com/"
  extractedAt: "2026-05-11T12:15:00Z"
  extractedBy: "claude-agent + playwright-scraper"

colors:
  primary: "#003DA5"              # Deep royal GWR blue — hero, news grid, CTA buttons
  primaryForeground: "#FFFFFF"    # White text on blue
  secondary: "#44AD49"            # Green — hero "ORDER NOW" button, secondary CTAs
  secondaryForeground: "#FFFFFF"  # White text on green
  accent: "#DF3A56"               # Red/coral — "AMAZING" tagline, "View product" buttons
  accentForeground: "#FFFFFF"     # White text on red
  background: "#FFFFFF"           # White page background
  foreground: "#333333"           # Dark gray body text
  muted: "#F1F1F1"                # Light gray — alternating sections, footer bg
  mutedForeground: "#666666"      # Medium gray — captions, secondary text
  headerBackground: "#FFFFFF"     # White navigation bar
  headerForeground: "#333333"     # Dark gray nav text
  footerBackground: "#F1F1F1"     # Light gray footer
  footerForeground: "#333333"     # Dark footer text
  border: "#E0E0E0"               # Light gray borders
  ring: "#003DA5"                 # Blue focus ring
  extra:
    - { name: "dark-section-bg", value: "#003DA5", note: "Blue background for hero, news, dark sections" }
    - { name: "dark-section-fg", value: "#FFFFFF", note: "White text on dark sections" }

typography:
  headingFamily: "Rubik"          # rubik_medium on the site — available on Google Fonts
  headingWeight: "500"
  bodyFamily: "Rubik"             # rubik_regular on the site
  bodyWeight: "400"
  monoFamily: ""
  googleFontsUrl: "https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap"
  scale:
    hero: "52px"
    h1: "40px"
    h2: "28px"
    h3: "20px"
    body: "18px"
    small: "14px"
  headingTransform: "none"
  letterSpacing: "normal"
  lineHeight: "1.7"

spacing:
  density: "comfortable"
  sectionGap: "3rem"
  containerMaxWidth: "1220px"
  containerPadding: "1rem"

shape:
  borderRadius: "6px"
  buttonRadius: "6px"
  cardRadius: "8px"
  imageRadius: "4px"
  shadowStyle: "subtle"           # Light shadows on cards
  borderStyle: "minimal"          # Thin borders, mostly on cards

tone:
  overall: "bold, energetic, authoritative"
  colorMode: "mixed"              # Dark hero/news sections, light content sections
  contrast: "high"
  imagery: "photo-heavy"          # Dense image grids, editorial style
  heroStyle: "full-bleed-image"   # Carousel with background images and text overlay
  cardStyle: "image-top"          # Cards with images above text
  navStyle: "solid-bar"           # White solid header bar

tailwind:
  colors:
    brand:
      primary: "#003DA5"
      secondary: "#44AD49"
      accent: "#DF3A56"
  fontFamily:
    heading: ["Rubik", "Helvetica Neue", "Helvetica", "Arial", "sans-serif"]
    body: ["Rubik", "Helvetica Neue", "Helvetica", "Arial", "sans-serif"]
  borderRadius:
    DEFAULT: "6px"
    button: "6px"
    card: "8px"

cssVariables: |
  :root {
    --brand-primary: #003DA5;
    --brand-primary-foreground: #FFFFFF;
    --brand-accent: #DF3A56;
    --brand-accent-foreground: #FFFFFF;
    --brand-dark: #003DA5;
    --brand-dark-foreground: #FFFFFF;
    --brand-bg: #FFFFFF;
    --brand-fg: #333333;
    --brand-muted: #F1F1F1;
    --brand-muted-foreground: #666666;
    --brand-header-bg: #FFFFFF;
    --brand-header-fg: #333333;
    --brand-footer-bg: #F1F1F1;
    --brand-footer-fg: #333333;
    --brand-border: #E0E0E0;
    --brand-heading-font: 'Rubik', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    --brand-body-font: 'Rubik', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    --brand-button-radius: 6px;
    --brand-card-radius: 8px;
  }

extraction:
  confidence: "high"
  method: "playwright-scraper + screenshot-analysis"
  notes:
    - "Scraper landed on cookie policy page (cookie consent redirect), but CSS/font data still valid"
    - "Colors confirmed from user-provided full homepage screenshot"
    - "Font 'rubik_medium' and 'rubik_regular' are self-hosted; mapped to Google Fonts 'Rubik' weight 400/500"
    - "Custom icon font 'gwr' used for icons — not replicable, will use Lucide icons as substitute"
    - "Green (#44AD49) used for hero CTA 'ORDER NOW' — may be treated as secondary or ignored in favor of primary blue"
    - "Red/coral (#DF3A56) is strong accent — used in 'AMAZING' tagline, product buttons, footer links"
    - "Site uses very dense image grids in news section — may need custom variant for grid layout"
