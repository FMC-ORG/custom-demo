# Howdens Brand Theme
# Generated by sitecore-extract-theme skill (screenshot-first analysis)
# Source: https://www.howdens.com/ — full-page desktop screenshot

client:
  name: "Howdens"
  sourceUrl: "https://www.howdens.com/"
  extractedAt: "2026-04-29T08:55:00Z"
  extractedBy: "claude (cursor)"

colors:
  # Howdens signature red (rooster logo + accent badges, e.g. "3-year guarantee")
  primary: "#E2231A"
  primaryForeground: "#FFFFFF"
  # Slate charcoal used for hero, "Howdens Quartz", "New brochures", "Bedroom inspiration" bands
  secondary: "#2D3640"
  secondaryForeground: "#FFFFFF"
  # Howdens trade green (top BOOK button + design appointment CTA)
  accent: "#3CB54A"
  accentForeground: "#FFFFFF"
  background: "#FFFFFF"
  foreground: "#1F2933"
  # Light neutral for "Real Homes" / "Buying from Howdens" alternating bands
  muted: "#F4F5F6"
  mutedForeground: "#5C6470"
  # Header/utility strip — pale neutral with dark text
  headerBackground: "#FFFFFF"
  headerForeground: "#1F2933"
  # Footer — deep navy/charcoal
  footerBackground: "#1A2230"
  footerForeground: "#C2C8D0"
  border: "#E2E4E8"
  ring: "#E2231A"
  extra:
    - name: "trustpilot-green"
      value: "#00B67A"
      usage: "Trustpilot stars + 'Excellent' badge"
    - name: "promo-orange"
      value: "#F2784B"
      usage: "Kitchen Visualiser promotional banner"

typography:
  # Howdens uses a proprietary geometric grotesk on site.
  # Substitute Poppins (heading 700/900) + Inter (body) for the demo — both on Google Fonts.
  headingFamily: "Poppins"
  headingWeight: "700"
  bodyFamily: "Inter"
  bodyWeight: "400"
  monoFamily: "ui-monospace"
  googleFontsUrl: "https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;900&family=Inter:wght@400;500;600&display=swap"
  scale:
    hero: "3.5rem"
    h1: "2.75rem"
    h2: "2rem"
    h3: "1.5rem"
    body: "1rem"
    small: "0.875rem"
  headingTransform: "none"
  letterSpacing: "-0.01em"
  lineHeight: "1.5"

spacing:
  density: "spacious"
  sectionGap: "5rem"
  containerMaxWidth: "1280px"
  containerPadding: "1.5rem"

shape:
  borderRadius: "0.375rem"
  buttonRadius: "9999px"   # pill buttons (BOOK, "BOOK A DESIGN APPOINTMENT")
  cardRadius: "0.5rem"     # category cards have light rounding
  imageRadius: "0.5rem"
  shadowStyle: "subtle"
  borderStyle: "none"      # most sections rely on background color, not borders

tone:
  overall: "practical, trade-friendly, photography-led"
  colorMode: "mixed"       # alternates white / muted neutral / slate-charcoal dark bands
  contrast: "medium-high"
  imagery: "photography"   # real kitchens, product shots, lifestyle
  # Hero is split: dark slate left text + large product photo right with red corner badge
  heroStyle: "split-image-text"
  # Category cards have image fill with white pill label centered at the bottom
  cardStyle: "image-top"
  # Nav is a solid white utility row with red Howdens logo + green BOOK button on the right
  navStyle: "solid-bar"

tailwind:
  colors:
    brand:
      primary: "#E2231A"
      secondary: "#2D3640"
      accent: "#3CB54A"
  fontFamily:
    heading: ["Poppins", "sans-serif"]
    body: ["Inter", "sans-serif"]
  borderRadius:
    DEFAULT: "0.375rem"
    button: "9999px"
    card: "0.5rem"

cssVariables: |
  :root {
    --brand-primary: #E2231A;
    --brand-primary-foreground: #FFFFFF;
    --brand-secondary: #2D3640;
    --brand-secondary-foreground: #FFFFFF;
    --brand-accent: #3CB54A;
    --brand-accent-foreground: #FFFFFF;
    --brand-bg: #FFFFFF;
    --brand-fg: #1F2933;
    --brand-muted: #F4F5F6;
    --brand-muted-fg: #5C6470;
    --brand-header-bg: #FFFFFF;
    --brand-header-fg: #1F2933;
    --brand-footer-bg: #1A2230;
    --brand-footer-fg: #C2C8D0;
    --brand-border: #E2E4E8;
    --brand-ring: #E2231A;
    --brand-heading-font: 'Poppins', sans-serif;
    --brand-body-font: 'Inter', sans-serif;
    --brand-radius: 0.375rem;
    --brand-button-radius: 9999px;
    --brand-card-radius: 0.5rem;
  }

extraction:
  confidence: "medium"
  method: "visual-only"
  notes:
    - "Playwright site-scraper.mjs failed: page.goto networkidle timed out at 90s on howdens.com (heavy analytics + Cloudflare keep network open)."
    - "Theme extracted from user-provided full-page desktop screenshot + WebFetch metadata + brand-known Howdens palette (red rooster, green CTA, slate hero)."
    - "Hex values are visual approximations — primary red and trade green are typical Howdens brand colors but not pulled from CSS tokens."
    - "Headings: Howdens uses a proprietary geometric grotesk on site. Substituted Poppins (Google Fonts) for the demo — closest free equivalent for trade/industrial feel."
    - "Body font: substituted Inter (Google Fonts) for the demo."
    - "Button radius set to pill (9999px) to match the green BOOK button + 'BOOK A DESIGN APPOINTMENT' CTA observed on site."
    - "tone.colorMode is 'mixed' — Howdens alternates white content sections with dark slate promotional bands and a near-black footer."
